name: Build Multi-Arch Docker Image

on:
  push:
    tags: ['*.*.*', '*.*.*-*']

env:
  VERSION: 4.98.2

jobs:
  
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Code Server
      run: |
        mkdir -p downloads
        wget -q https://github.com/coder/code-server/releases/download/v$VERSION/code-server-$VERSION-linux-amd64.tar.gz -O "downloads/code-server-$VERSION-linux-amd64.tar.gz"
        wget -q https://github.com/coder/code-server/releases/download/v$VERSION/code-server-$VERSION-linux-arm64.tar.gz -O "downloads/code-server-$VERSION-linux-arm64.tar.gz"

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract Docker metadata (default)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          bayrell/ubuntu_code_server
          ghcr.io/${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=ref,event=tag
          type=raw,value=latest-default
          type=raw,value=${{ env.VERSION }}

    - name: Extract Docker metadata (CUDA)
      id: meta_cuda
      uses: docker/metadata-action@v5
      with:
        images: |
          bayrell/ubuntu_code_server
          ghcr.io/${{ github.repository }}
        tags: |
          type=ref,event=branch,suffix=-cuda
          type=ref,event=pr,suffix=-cuda
          type=ref,event=tag,suffix=-cuda
          type=raw,value=latest-cuda
          type=raw,value=${{ env.VERSION }}-cuda

    - name: Build and push Docker image (default)
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        file: Dockerfile
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          CODE_SERVER_VERSION=${{ env.VERSION }}

    - name: Build and push Docker image (CUDA)
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        file: Dockerfile.cuda
        platforms: linux/amd64
        tags: ${{ steps.meta_cuda.outputs.tags }}
        labels: ${{ steps.meta_cuda.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          CODE_SERVER_VERSION=${{ env.VERSION }}
