name: Build Multi-Arch Docker Image

on:
  push:
    tags: ['*.*.*', '*.*.*-*']

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Code Server
      env:
        VERSION: 4.98.2
      run: |
        mkdir -p downloads
        wget -q https://github.com/coder/code-server/releases/download/v$VERSION/code-server-$VERSION-linux-amd64.tar.gz -O "downloads/code-server-$VERSION-linux-amd64.tar.gz"
        wget -q https://github.com/coder/code-server/releases/download/v$VERSION/code-server-$VERSION-linux-arm64.tar.gz -O "downloads/code-server-$VERSION-linux-arm64.tar.gz"

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract Docker metadata (standard)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          bayrell/ubuntu_code_server
          ghcr.io/${{ github.repository }}
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=ref,event=branch
          type=ref,event=pr
          type=ref,event=tag
          type=sha,prefix=sha-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Extract Docker metadata (CUDA)
      id: meta_cuda
      uses: docker/metadata-action@v5
      with:
        images: |
          bayrell/ubuntu_code_server
          ghcr.io/${{ github.repository }}
        tags: |
          type=semver,pattern={{version}},suffix=-cuda
          type=semver,pattern={{major}}.{{minor}},suffix=-cuda
          type=semver,pattern={{major}},suffix=-cuda
          type=ref,event=branch,suffix=-cuda
          type=ref,event=pr,suffix=-cuda
          type=ref,event=tag,suffix=-cuda
          type=sha,prefix=sha-,suffix=-cuda
          type=raw,value=latest-cuda,enable={{is_default_branch}}

    - name: Build and push Docker image (standard)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        push: true

    - name: Build and push Docker image (CUDA)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile.cuda
        platforms: linux/amd64
        tags: ${{ steps.meta_cuda.outputs.tags }}
        labels: ${{ steps.meta_cuda.outputs.labels }}
        push: true
